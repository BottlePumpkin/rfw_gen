name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Publish rfw_gen
        run: dart pub publish --directory packages/rfw_gen --force

      - name: Wait for pub.dev indexing
        run: sleep 60

      - name: Patch rfw_gen_builder dependency for publishing
        run: |
          cd packages/rfw_gen_builder
          python3 -c "
          import re
          with open('pubspec.yaml') as f: content = f.read()
          content = re.sub(r'  rfw_gen:\n    path: \.\./rfw_gen', '  rfw_gen: ^${GITHUB_REF_NAME#v}', content)
          with open('pubspec.yaml', 'w') as f: f.write(content)
          "

      - name: Publish rfw_gen_builder
        run: dart pub publish --directory packages/rfw_gen_builder --force
