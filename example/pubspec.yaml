name: rfw_gen_example
description: Example app demonstrating rfw_gen code generation.
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  marionette_flutter: ^0.4.0
  rfw: ^1.0.0
  rfw_gen:
    path: ../packages/rfw_gen
  rfw_preview:
    path: ../packages/rfw_preview

flutter:
  uses-material-design: true
  assets:
    - assets/catalog_widgets.rfw
    - assets/shop_widgets.rfw
    - assets/custom_widgets.rfw
    - lib/catalog/catalog_widgets.rfwtxt
    - lib/custom/custom_widgets.rfwtxt
    - lib/ecommerce/shop_widgets.rfwtxt

dev_dependencies:
  build_runner: ^2.4.0
  lints: ^5.0.0
  rfw_gen_builder:
    path: ../packages/rfw_gen_builder
  flutter_test:
    sdk: flutter

dependency_overrides:
  rfw_gen:
    path: ../packages/rfw_gen
