widgets:
  CustomText:
    import: custom.widgets
  CustomBounceTapper:
    import: custom.widgets
    child_type: optionalChild
    handlers: [onTap]
  NullConditionalWidget:
    import: custom.widgets
    child_type: optionalChild
  CustomButton:
    import: custom.widgets
    child_type: child
    handlers: [onPressed, onLongPress]
  CustomBadge:
    import: custom.widgets
  CustomProgressBar:
    import: custom.widgets
  CustomColumn:
    import: custom.widgets
    child_type: childList
  SkeletonContainer:
    import: custom.widgets
    child_type: optionalChild
  CompareWidget:
    import: custom.widgets
    child_type: optionalChild
  PvContainer:
    import: custom.widgets
    child_type: optionalChild
    handlers: [onPv]
  CustomCard:
    import: custom.widgets
    child_type: child
    handlers: [onTap]
  CustomTile:
    import: custom.widgets
    child_type: namedSlots
    named_child_slots:
      leading: false
      title: false
      subtitle: false
      trailing: false
    handlers: [onTap]
  CustomAppBar:
    import: custom.widgets
    child_type: namedSlots
    named_child_slots:
      title: false
      actions: true
