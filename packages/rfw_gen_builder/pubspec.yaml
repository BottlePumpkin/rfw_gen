name: rfw_gen_builder
description: build_runner code generator for rfw_gen. Converts @RfwWidget-annotated Flutter functions to RFW format.
version: 0.2.1
homepage: https://github.com/BottlePumpkin/rfw_gen
repository: https://github.com/BottlePumpkin/rfw_gen
topics:
  - rfw
  - remote-flutter-widgets
  - code-generation
  - build-runner

environment:
  sdk: ^3.0.0

dependencies:
  analyzer: ">=7.4.5 <10.0.0"
  build: ^4.0.0
  rfw: ^1.0.0
  yaml: ^3.1.0
  rfw_gen:
    path: ../rfw_gen

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^3.5.0
  lints: ^5.0.0
  test: ^1.25.0
