name: rfw_gen_workspace
description: Monorepo workspace for rfw_gen packages.
publish_to: none

environment:
  sdk: ^3.6.0

workspace:
  - packages/rfw_gen
  - packages/rfw_gen_builder
  - packages/rfw_gen_mcp

dev_dependencies:
  melos: ^7.0.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true
  scripts:
    analyze:
      description: Run dart analyze on all packages
      exec: dart analyze .
    format:
      description: Run dart format on all packages
      exec: dart format .
    format:check:
      description: Check dart format without modifying files
      exec: dart format --set-exit-if-changed .
    test:
      description: Run tests on all packages (excludes golden tests)
      exec: dart test
      packageFilters:
        dirExists: test
    test:golden:
      description: Run golden tests in example
      exec: flutter test --tags golden
      packageFilters:
        scope: rfw_gen_example
    test:all:
      description: Run all tests including golden
      exec: flutter test
      packageFilters:
        dirExists: test
