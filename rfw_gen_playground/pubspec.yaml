name: rfw_gen_playground
description: >
  rfw_gen documentation site — docs built with @RfwWidget,
  hosted as rfwtxt on GitHub, rendered via Remote Flutter Widgets.
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  rfw: ^1.0.0
  rfw_gen: ^0.4.0
  http: ^1.0.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  rfw_gen_builder: ^0.4.0
  lints: ^5.0.0

flutter:
  uses-material-design: true
